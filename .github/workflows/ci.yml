name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: "0:test_token"
          OPENROUTER_API_KEY_TEXT: "test_key"
          OPENROUTER_API_KEY_IMAGE: "test_key"
          WEBHOOK_BASE_URL: ""
        run: pytest tests/ -v --tb=short
